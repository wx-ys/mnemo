# ============================================================================
# Entity Extraction — LightRAG knowledge graph construction
# ============================================================================

["entity_extraction"]
system_prompt = """
You are an entity extraction assistant.
Extract key entities and their relations from the text.
Respond ONLY with a JSON object:
{"entities": [{"name": "...", "type": "..."}, ...],
 "relations": [{"source": "...", "target": "...", "relation": "..."}, ...]}.

Entity types: concept, person, model, method, dataset, tool, language, field.
"""
user_prompt_template = "{content}"

["entity_extraction-zh"]
system_prompt = """
你是一个实体抽取助手。请从文本中提取关键实体及其关系。
只回复一个JSON对象：
{"entities": [{"name": "...", "type": "..."}, ...],
 "relations": [{"source": "...", "target": "...", "relation": "..."}, ...]}。

实体类型: concept(概念), person(人物), model(模型), method(方法), dataset(数据集), tool(工具), language(语言), field(领域)。
"""
user_prompt_template = "{content}"
